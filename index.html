<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Monkey Mountain Madness</title>

  <style>
    :root {
      --game-aspect: 1024 / 1536;
      --footer-space: 72px; /* leaves a little room at bottom for future ad/UI space */
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .game-shell {
      width: 100vw;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: env(safe-area-inset-top, 0);
      padding-right: env(safe-area-inset-right, 0);
      padding-bottom: calc(env(safe-area-inset-bottom, 0) + var(--footer-space));
      padding-left: env(safe-area-inset-left, 0);
      box-sizing: border-box;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      background: #000;
      touch-action: none;

      /* Fit by whichever dimension runs out first, while preserving portrait aspect */
      width: min(100vw, calc((100dvh - var(--footer-space)) * var(--game-aspect)));
      height: min(calc(100dvh - var(--footer-space)), calc(100vw / var(--game-aspect)));

      max-width: 100%;
      max-height: calc(100dvh - var(--footer-space));
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="game" width="1024" height="1536"></canvas>
  </div>

  <script>
    // Stop Safari/iPhone from treating swipes as page movement
    document.addEventListener("touchmove", function (e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener("gesturestart", function (e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener("gesturechange", function (e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener("gestureend", function (e) {
      e.preventDefault();
    }, { passive: false });
  </script>

  <script src="js/game.js"></script>
</body>
</html>
