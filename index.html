<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Monkey Mountain Madness</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .game-shell {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-bottom: 72px; /* reserved footer space */
      box-sizing: border-box;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      background: #000;
      touch-action: none;
      max-width: 100vw;
      max-height: calc(100vh - 72px);
      max-height: calc(100dvh - 72px);
      aspect-ratio: 1024 / 1536;
      width: auto;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <canvas id="game" width="1024" height="1536"></canvas>
  </div>

  <script>
    document.addEventListener("touchmove", function (e) {
      e.preventDefault();
    }, { passive: false });
  </script>

  <script src="js/game.js"></script>
</body>
</html>
